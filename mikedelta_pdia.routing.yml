mikedelta_pdia.calendar:
  path: '/md-pdia'
  defaults:
    _controller: '\Drupal\mikedelta_pdia\Controller\PdiaCalendarController::build'
    _title: 'Plano do Dia'
  requirements:
    _access: 'TRUE'

mikedelta_pdia.admin_calendar:
  path: '/admin/content/md-pdia/gerenciar'
  defaults:
    _controller: '\Drupal\mikedelta_pdia\Controller\PdiaAdminController::buildAdmin'
    _title: 'Gerenciar Calendário'
  requirements:
    _permission: 'administrar mikedelta pdia'

mikedelta_pdia.settings:
  path: '/admin/content/md-pdia/definicoes'
  defaults:
    _form: '\Drupal\mikedelta_pdia\Form\PdiaSettingsForm'
    _title: 'Definições Gerais'
  requirements:
    _permission: 'administrar mikedelta pdia'

mikedelta_pdia.api_save_license:
  path: '/admin/api/md-pdia/salvar-licenca'
  defaults:
    _controller: '\Drupal\mikedelta_pdia\Controller\PdiaApiController::salvarLicenca'
  requirements:
    _permission: 'administrar mikedelta pdia'
    _csrf_request_header_token: 'TRUE'
  methods: [POST]

mikedelta_pdia.api_delete_license:
  path: '/admin/api/md-pdia/apagar-licenca'
  defaults:
    _controller: '\Drupal\mikedelta_pdia\Controller\PdiaApiController::apagarLicenca'
  requirements:
    _permission: 'administrar mikedelta pdia'
    _csrf_request_header_token: 'TRUE'
  methods: [POST]

mikedelta_pdia.import_export_page:
  path: '/admin/config/content/md-pdia/importar-exportar'
  defaults:
    _form: '\Drupal\mikedelta_pdia\Form\PdiaImportExportForm'
    _title: 'Importar/Exportar'
  requirements:
    _permission: 'administrar mikedelta pdia'